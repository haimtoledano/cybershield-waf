                  |iso-8859-1| |iso-8859-15| |windows-1252|''\"\n\n#\n# -- [[ HTTP
                  Argument/Upload Limits ]] -----------------------------------------\n#\n#
                  Here you can define optional limits on HTTP get/post parameters
                  and uploads.\n# This can help to prevent application specific DoS
                  attacks.\n#\n# These values are checked in REQUEST-920-PROTOCOL-ENFORCEMENT.conf.\n#
