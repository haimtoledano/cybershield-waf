                  HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0''\"\n\n# Forbidden file
                  extensions.\n# Guards against unintended exposure of development/configuration
                  files.\n# Default: .asa/ .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/
