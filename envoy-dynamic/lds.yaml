                  .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/
                  .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/
                  .vsdisco/ .webinfo/ .xsd/ .xsx/\n# Example: .bak/ .config/ .conf/
                  .db/ .ini/ .log/ .old/ .pass/ .pdb/ .rdb/ .sql/\n# Note that .axd
