                  &TX:notice_anomaly_score \"@eq 0\" \\\n    \"id:901143,\\\n    phase:1,\\\n    pass,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    setvar:''tx.notice_anomaly_score=2''\"\n\n#
                  Default HTTP policy: allowed_methods (rule 900200 in crs-setup.conf)\nSecRule
                  &TX:allowed_methods \"@eq 0\" \\\n    \"id:901160,\\\n    phase:1,\\\n    pass,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    setvar:''tx.allowed_methods=GET
