                  Example: 255\n# Note that a hard limit by the engine may also apply
                  here (SecArgumentsLimit).\n# This would override this soft limit.\n#
                  Uncomment this rule to set a limit.\n#SecAction \\\n#    \"id:900300,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:tx.max_num_args=255\"\n\n#
                  Block request if the length of any argument name is too high\n#
                  Default: unlimited\n# Example: 100\n# Uncomment this rule to set
