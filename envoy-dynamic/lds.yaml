                  \"application/x-amf\", \"application/octet-stream\", etc..)\n# could
                  lead to a WAF bypass. For example, a malicious JSON payload submitted
                  with a \"text/plain\"\n# content type may still be interpreted as
                  JSON by a backend application but would not trigger the\n# JSON
                  body parser at the WAF, leading to a bypass.\n#\n# To prevent blocking
                  request with not allowed content-type by default, you can create
                  an exclusion\n# rule that removes rule 920420. For example:\n#SecRule
                  REQUEST_HEADERS:Content-Type \"@rx ^text/plain\" \\\n#    \"id:1234,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    ctl:ruleRemoveById=920420,\\\n#    chain\"\n#    SecRule
                  REQUEST_URI \"@rx ^/foo/bar\" \\\n#        \"t:none\"\n#\n# Uncomment
