                  forced body inspection for ASCII content'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    chain\"\n    SecRule
                  REQBODY_PROCESSOR \"!@rx (?:URLENCODED|MULTIPART|XML|JSON)\" \\\n        \"ctl:requestBodyProcessor=URLENCODED\"\n\n\n#\n#
                  -=[ Easing In / Sampling Percentage ]=-\n#\n# This is used to send
                  only a limited percentage of requests into the Core\n# Rule Set.
                  The selection is based on TX.sampling_percentage and a pseudo\n#
                  random number calculated below.\n#\n# Use this to ease into a new
                  Core Rules installation with an existing\n# productive service.\n#\n#
                  See\n# https://www.netnea.com/cms/2016/04/26/easing-in-conditional-modsecurity-rule-execution-based-on-pseudo-random-numbers/\n#\n\n#\n#
                  Generate the pseudo random number\n#\n# ATTENTION: This is no cryptographically
                  secure random number. It''s just\n# a cheap way to get some random
                  number suitable for sampling.\n#\n# We take the entropy contained
                  in the UNIQUE_ID. We hash that variable and\n# take the first integer
                  numbers out of it. Theoretically, it is possible\n# but highly improbable
                  that there are no integers in a hexEncoded sha1 hash.\n# In the
                  very rare event that two integers are not matched (due to only being\n#
                  a-f in all, or all but one positions) 901450 will not be triggered.\n#
                  Leading zeros are not removed from the two-digit random number,
                  and are\n# handled gracefullly by 901450\n\nSecRule TX:sampling_percentage
                  \"@eq 100\" \\\n    \"id:901400,\\\n    phase:1,\\\n    pass,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    skipAfter:END-SAMPLING\"\n\nSecRule
                  UNIQUE_ID \"@rx ^[a-f]*([0-9])[a-f]*([0-9])\" \\\n    \"id:901410,\\\n    phase:1,\\\n    pass,\\\n    capture,\\\n    t:sha1,t:hexEncode,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    setvar:''TX.sampling_rnd100=%{TX.1}%{TX.2}''\"\n\n#\n#
                  Sampling decision\n#\n# If a request is allowed to pass without
                  being checked by the CRS, there is no\n# entry in the audit log
                  (for performance reasons), but an error log entry is\n# being written.  If
                  you want to disable the error log entry, then issue the\n# following
                  directive somewhere after the inclusion of the CRS\n# (E.g., RESPONSE-999-EXCEPTIONS.conf).\n#\n#
                  SecRuleUpdateActionById 901450 \"nolog\"\n#\n\n\nSecRule TX:sampling_rnd100
                  \"!@lt %{tx.sampling_percentage}\" \\\n    \"id:901450,\\\n    phase:1,\\\n    pass,\\\n    log,\\\n    noauditlog,\\\n    msg:''Sampling:
                  Disable the rule engine based on sampling_percentage %{TX.sampling_percentage}
                  and random number %{TX.sampling_rnd100}'',\\\n    ctl:ruleRemoveByTag=OWASP_CRS,\\\n    ver:''OWASP_CRS/4.0.0''\"\n\nSecMarker
                  \"END-SAMPLING\"\n\n\n#\n# Configuration Plausibility Checks\n#\n\n#
                  Make sure detection paranoia level is not lower than paranoia level\nSecRule
                  TX:detection_paranoia_level \"@lt %{tx.blocking_paranoia_level}\"
                  \\\n    \"id:901500,\\\n    phase:1,\\\n    deny,\\\n    status:500,\\\n    t:none,\\\n    log,\\\n    msg:''Detection
                  paranoia level configured is lower than the paranoia level itself.
                  This is illegal. Blocking request. Aborting'',\\\n    ver:''OWASP_CRS/4.0.0''\"\n",
                  "# ------------------------------------------------------------------------\n#
                  OWASP CRS ver.4.0.0\n# Copyright (c) 2006-2020 Trustwave and contributors.
