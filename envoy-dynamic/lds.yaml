                  |multipart/form-data| |multipart/related| |text/xml| |application/xml|
                  |application/soap+xml| |application/json| |application/cloudevents+json|
                  |application/cloudevents-batch+json|''\"\n\n# Allowed HTTP versions.\n#
                  Default: HTTP/1.0 HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0\n# Example
                  for legacy clients: HTTP/0.9 HTTP/1.0 HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3
                  HTTP/3.0\n# Note that some web server versions use ''HTTP/2'', some
