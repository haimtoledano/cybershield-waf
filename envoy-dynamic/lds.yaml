                  &TX:early_blocking \"@eq 0\" \\\n    \"id:901115,\\\n    phase:1,\\\n    pass,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    setvar:''tx.early_blocking=0''\"\n\n#
                  Default Blocking Paranoia Level (rule 900000 in crs-setup.conf)\nSecRule
