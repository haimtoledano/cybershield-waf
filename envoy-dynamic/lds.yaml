                  \\\n        \"t:none,\\\n        chain\"\n        SecRule REQUEST_LINE
                  \"@rx ^(?:GET /|OPTIONS \\*) HTTP/[12]\\.[01]$\" \\\n            \"t:none,\\\n            ctl:ruleRemoveByTag=OWASP_CRS,\\\n            ctl:auditEngine=Off\"\n",
                  "# ------------------------------------------------------------------------\n#
