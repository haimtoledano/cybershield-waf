                  REMOTE_ADDR \"@ipMatch 127.0.0.1,::1\" \\\n        \"t:none,\\\n        ctl:ruleRemoveByTag=OWASP_CRS,\\\n        ctl:auditEngine=Off\"\n\n#\n#
                  Exception for Apache internal dummy connection\n#\nSecRule REMOTE_ADDR
