                  \\\n    \"id:921200,\\\n    phase:2,\\\n    block,\\\n    capture,\\\n    t:none,t:htmlEntityDecode,\\\n    msg:''LDAP
                  Injection Attack'',\\\n    logdata:''Matched Data: %{TX.0} found
