                  Default Detection Paranoia Level (rule 900001 in crs-setup.conf)\nSecRule
                  &TX:detection_paranoia_level \"@eq 0\" \\\n    \"id:901125,\\\n    phase:1,\\\n    pass,\\\n    nolog,\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    setvar:''tx.detection_paranoia_level=%{TX.blocking_paranoia_level}''\"\n\n#
