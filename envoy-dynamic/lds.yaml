                  Uncomment this rule to change the default.\n#SecAction \\\n#    \"id:900255,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:''tx.restricted_headers_extended=/accept-charset/''\"\n\n#
                  Content-Types charsets that a client is allowed to send in a request.\n#
