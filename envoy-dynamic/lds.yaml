                  add your whole custom\n# Content-Type with lowercase.\n#\n# Bypass
                  Warning: some applications may not rely on the content-type request
                  header in order\n# to parse the request body. This could make an
                  attacker able to send malicious URLENCODED/JSON/XML\n# payloads
