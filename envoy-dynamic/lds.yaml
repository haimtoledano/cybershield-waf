                  Uncomment this rule to change the default.\n#SecAction \\\n#    \"id:900240,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:''tx.restricted_extensions=.asa/
                  .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/
                  .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/
                  .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/
                  .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/
                  .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/
                  .xsd/ .xsx/''\"\n\n# Restricted request headers.\n# The HTTP request
                  headers that CRS restricts are split into two categories:\n# basic
                  (always forbidden) and extended (may be forbidden). All header names\n#
                  should be lowercase and enclosed by /slashes/ as delimiters.\n#\n#
                  [ Basic ]\n# Includes deprecated headers and headers with known
                  security risks. Always\n# forbidden.\n# Default: /content-encoding/
                  /proxy/ /lock-token/ /content-range/ /if/ /x-http-method-override/
                  /x-http-method/ /x-method-override/\n#\n# /content-encoding/\n#   Used
                  to list any encodings that have been applied to the original payload.\n#   Only
                  used for compression, which isn''t supported by CRS by default since
                  CRS\n#   blocks newlines and null bytes inside the request body.
                  Most compression\n#   algorithms require at least null bytes per
                  RFC. Blocking Content-Encoding\n#   shouldn''t break anything and
                  increases security since WAF engines, including\n#   ModSecurity,
                  are typically incapable of properly scanning compressed request\n#   bodies.\n#\n#
                  /proxy/\n#   Blocking this prevents the ''httpoxy'' vulnerability:
                  https://httpoxy.org\n#\n# /lock-token/\n#\n# /content-range/\n#\n#
                  /if/\n#\n# /x-http-method-override/\n# /x-http-method/\n# /x-method-override/\n#   Blocking
                  these headers prevents method override attacks, as described here:\n#   https://www.sidechannel.blog/en/http-method-override-what-it-is-and-how-a-pentester-can-use-it\n#\n#
                  Uncomment this rule to change the default.\n#SecAction \\\n#    \"id:900250,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:''tx.restricted_headers_basic=/content-encoding/
                  /proxy/ /lock-token/ /content-range/ /if/ /x-http-method-override/
                  /x-http-method/ /x-method-override/''\"\n#\n# [ Extended ]\n# Includes
                  deprecated headers that are still in use (so false positives are\n#
                  possible) and headers with possible security risks. Forbidden at
                  a higher\n# paranoia level.\n# Default: /accept-charset/\n#\n# /accept-charset/\n#   Deprecated
                  header that should not be used by clients and should be ignored\n#   by
