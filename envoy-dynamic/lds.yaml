                  Block request if the file size of any individual uploaded file is
                  too high\n# Default: unlimited\n# Example: 1048576\n# Uncomment
                  this rule to set a limit.\n#SecAction \\\n#    \"id:900340,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:tx.max_file_size=1048576\"\n\n#
                  Block request if the total size of all combined uploaded files is
                  too high\n# Default: unlimited\n# Example: 1048576\n# Uncomment
                  this rule to set a limit.\n#SecAction \\\n#    \"id:900350,\\\n#    phase:1,\\\n#    pass,\\\n#    t:none,\\\n#    nolog,\\\n#    setvar:tx.combined_file_sizes=1048576\"\n\n\n#\n#
                  -- [[ Easing In / Sampling Percentage ]] -------------------------------------\n#\n#
                  Adding the CRS to an existing productive site can lead to false\n#
                  positives, unexpected performance issues and other undesired side
                  effects.\n#\n# It can be beneficial to test the water first by enabling
                  the CRS for a\n# limited number of requests only and then, when
