                  -= Paranoia Level 0 (empty) =- (apply unconditionally)\n#\n\n\n\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 1\" \"id:911011,phase:1,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 1\" \"id:911012,phase:2,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 1 (default) =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 1 or higher)\n#\n\n#\n# -=[ Allowed Request
                  Methods ]=-\n#\n# tx.allowed_methods is defined in the crs-setup.conf
                  file\n#\nSecRule REQUEST_METHOD \"!@within %{tx.allowed_methods}\"
                  \\\n    \"id:911100,\\\n    phase:1,\\\n    block,\\\n    msg:''Method
                  is not allowed by policy'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-generic'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272/220/274'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n\n\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 2\" \"id:911013,phase:1,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 2\" \"id:911014,phase:2,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 2 =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 2 or higher)\n#\n\n\n\nSecRule TX:DETECTION_PARANOIA_LEVEL
                  \"@lt 3\" \"id:911015,phase:1,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 3\" \"id:911016,phase:2,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 3 or higher)\n#\n\n\n\nSecRule TX:DETECTION_PARANOIA_LEVEL
                  \"@lt 4\" \"id:911017,phase:1,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 4\" \"id:911018,phase:2,pass,nolog,skipAfter:END-REQUEST-911-METHOD-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 4 =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 4 or higher)\n#\n\n\n\n#\n# -= Paranoia Levels
                  Finished =-\n#\nSecMarker \"END-REQUEST-911-METHOD-ENFORCEMENT\"\n",
                  "# ------------------------------------------------------------------------\n#
                  OWASP CRS ver.4.0.0\n# Copyright (c) 2006-2020 Trustwave and contributors.
                  All rights reserved.\n# Copyright (c) 2021-2024 CRS project. All
                  rights reserved.\n#\n# The OWASP CRS is distributed under\n# Apache
                  Software License (ASL) version 2\n# Please see the enclosed LICENSE
                  file for full details.\n# ------------------------------------------------------------------------\n\n#\n#
                  Some protocol violations are common in application layer attacks.\n#
                  Validating HTTP requests eliminates a large number of application
                  layer attacks.\n#\n# The purpose of this rules file is to enforce
                  HTTP RFC requirements that state how\n# the client is supposed to
                  interact with the server.\n# https://www.rfc-editor.org/rfc/rfc9110.html\n\n\n\n#\n#
                  -= Paranoia Level 0 (empty) =- (apply unconditionally)\n#\n\n\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 1\" \"id:920011,phase:1,pass,nolog,skipAfter:END-REQUEST-920-PROTOCOL-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 1\" \"id:920012,phase:2,pass,nolog,skipAfter:END-REQUEST-920-PROTOCOL-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 1 (default) =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 1 or higher)\n#\n\n#\n# Validate request line
                  against the format specified in the HTTP RFC\n#\n# -=[ Rule Logic
                  ]=-\n#\n# Uses rule negation against the regex for positive security.   The
                  regex specifies the proper\n# construction of URI request lines
                  such as:\n#\n#   \"http\" \"://\" authority path-abempty [ \"?\"
                  query ]\n#\n# It also outlines proper construction for CONNECT,
                  OPTIONS and GET requests.\n#\n# Regular expression generated from
                  regex-assembly/920100.ra.\n# To update the regular expression run
                  the following shell script\n# (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920100\n#\n# -=[ References
                  ]=-\n# https://www.rfc-editor.org/rfc/rfc9110.html#section-4.2.1\n#
                  http://capec.mitre.org/data/definitions/272.html\n#\nSecRule REQUEST_LINE
                  \"!@rx (?i)^(?:get /[^#\\?]*(?:\\?[^\\s\\v#]*)?(?:#[^\\s\\v]*)?|(?:connect
                  (?:(?:[0-9]{1,3}\\.){3}[0-9]{1,3}\\.?(?::[0-9]+)?|[\\--9A-Z_a-z]+:[0-9]+)|options
                  \\*|[a-z]{3,10}[\\s\\v]+(?:[0-9A-Z_a-z]{3,7}?://[\\--9A-Z_a-z]*(?::[0-9]+)?)?/[^#\\?]*(?:\\?[^\\s\\v#]*)?(?:#[^\\s\\v]*)?)[\\s\\v]+[\\.-9A-Z_a-z]+)$\"
                  \\\n    \"id:920100,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Invalid
                  HTTP Request Line'',\\\n    logdata:''%{request_line}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  Identify multipart/form-data name evasion attempts\n#\n# There are
                  possible impedance mismatches between how\n# ModSecurity interprets
                  multipart file names and how\n# a destination app server such as
                  PHP might parse the\n# Content-Disposition data:\n#\n#            filename-parm
                  := \"filename\" \"=\" value\n#\n# -=[ Rule Logic ]=-\n# These rules
                  check for the existence of the '' \" ; = meta-characters in\n# either
                  the \"name\" (FILES) and \"filename\" (FILES_NAMES) variables.\n#
                  HTML entities may lead to false positives, which is why\n# frequently
                  used ones, such as \"&auml;\", are allowed at PL1.\n#\n# -=[ Targets,
                  characters and html entities ]=-\n#\n# 920120 + 920122: PL1 : FILES_NAMES,
                  FILES\n#    Disallow [''\\\";=], except for frequently used HTML
                  entities (see 920120.data).\n#\n# 920121: PL2 : FILES_NAMES, FILES\n#    Disallow
                  [''\\\";=]\n#\n# -=[ References ]=-\n# http://www.ietf.org/rfc/rfc2183.txt\n#\n#
                  This rule used to use negative look-behind.\n# See https://github.com/coreruleset/coreruleset/wiki/Technical-Decisions-and-Best-Practices#avoiding-negative-look-behind-in-regular-expressions\n#
                  for an explanation of why it now uses `!@rx` instead to avoid look-around.\n#\n#
                  Regular expression generated from regex-assembly/920120.ra.\n# To
                  update the regular expression run the following shell script\n#
                  (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920120\n#\nSecRule
                  FILES|FILES_NAMES \"!@rx (?i)^(?:&(?:(?:[acegiln-or-suz]acut|[aeiou]grav|[ain-o]tild)e|[c-elnr-tz]caron|(?:[cgk-lnr-t]cedi|[aeiouy]um)l|[aceg-josuwy]circ|[au]ring|a(?:mp|pos)|nbsp|oslash);|[^\\\"'';=])*$\"
                  \\\n    \"id:920120,\\\n    phase:2,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''Attempted
                  multipart/form-data bypass'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Accept only digits in content length\n#\n# -=[ Rule Logic ]=-\n#
                  This rule uses ModSecurity''s rule negation against the regex meaning
                  if the Content-Length header\n# is NOT all digits, then it will
                  match.\n#\n# -=[ References ]=-\n# https://www.rfc-editor.org/rfc/rfc9110.html#section-8.6\n#\nSecRule
                  REQUEST_HEADERS:Content-Length \"!@rx ^\\d+$\" \\\n    \"id:920160,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Content-Length
                  HTTP header is not numeric'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Do not accept GET or HEAD requests with bodies\n# In RCF-9110, \"A
                  client SHOULD NOT generate content in a HEAD/GET request\n# unless
                  it is made directly to an origin server that has previously indicated\"\n#\n#
                  -=[ Rule Logic ]=-\n# The chained rule matches when:\n# 1) If the
                  request method is GET or HEAD\n# AND\n# 2) Header: Content-Length
                  exists and non-zero\n#\n# -=[ References ]=-\n# https://www.rfc-editor.org/rfc/rfc9110.html#section-9.3.1\n#
                  https://www.rfc-editor.org/rfc/rfc9110.html#section-9.3.2\n#\nSecRule
                  REQUEST_METHOD \"@rx ^(?:GET|HEAD)$\" \\\n    \"id:920170,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''GET
                  or HEAD Request with Body Content'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  REQUEST_HEADERS:Content-Length \"!@rx ^0?$\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  This is a sibling of rule 920170\n#\nSecRule REQUEST_METHOD \"@rx
                  ^(?:GET|HEAD)$\" \\\n    \"id:920171,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''GET
                  or HEAD Request with Transfer-Encoding'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  &REQUEST_HEADERS:Transfer-Encoding \"!@eq 0\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Require Content-Length or Transfer-Encoding to be provided with\n#
                  every POST request if the protocol version is not HTTP/2 or HTTP/3.\n#\n#
                  In case of HTTP/2, see the RFC7540 8.1 p52:\n# HTTP/2 does not use
                  the Transfer-Encoding: chunked anymore, because\n# the underlying
                  transport protocol is already using data frames with\n# known length.\n#\n#
                  In case of HTTP/3, see the RFC9114 4.1:\n# Transfer codings (see
                  Section 7 of [HTTP/1.1]) are not defined for\n# HTTP/3; the Transfer-Encoding
                  header field MUST NOT be used.\n#\n# -=[ Rule Logic ]=-\n# This
                  chained rule checks if the protocol is not HTTP/2 or HTTP/3,\n#
                  then checks request method is POST, if so, it checks that a\n# Content-Length
                  or Transfer-Encoding headers are also present.\n#\nSecRule REQUEST_PROTOCOL
                  \"!@within HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0\" \\\n    \"id:920180,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''POST
                  without Content-Length or Transfer-Encoding headers'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  REQUEST_METHOD \"@streq POST\" \\\n        \"chain\"\n        SecRule
                  &REQUEST_HEADERS:Content-Length \"@eq 0\" \\\n            \"chain\"\n            SecRule
                  &REQUEST_HEADERS:Transfer-Encoding \"@eq 0\" \\\n                \"setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n#\n#
                  As per RFC7230 3.3.2: A sender MUST NOT send a Content-Length\n#
                  header field in any message that contains a Transfer-Encoding header\n#
                  field.\n#\n# Related to 920170, 920171 and 920180.\n#\nSecRule &REQUEST_HEADERS:Transfer-Encoding
                  \"!@eq 0\" \\\n    \"id:920181,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Content-Length
                  and Transfer-Encoding headers present'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  &REQUEST_HEADERS:Content-Length \"!@eq 0\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  Range Header Check\n#\n# RFC7233 2.1 p6:\n# \"A byte-range-spec
                  is invalid if the last-byte-pos value is present\n# and less than
                  the first-byte-pos.\"\n#\n# -=[ Rule Logic ]=-\n# This rule compares
                  the first and second byte ranges and flags\n# when the first value
                  is greater than the second.\n#\n# -=[ References ]=-\n# https://datatracker.ietf.org/doc/html/rfc7233\n#
                  https://seclists.org/fulldisclosure/2011/Aug/175\n#\nSecRule REQUEST_HEADERS:Range|REQUEST_HEADERS:Request-Range
                  \"@rx (\\d+)-(\\d+)\" \\\n    \"id:920190,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,\\\n    msg:''Range:
                  Invalid Last Byte Value'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  TX:2 \"@lt %{tx.1}\" \\\n        \"setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  Broken/Malicious clients often have duplicate or conflicting headers\n#
                  Automated programs and bots often do not obey the HTTP RFC\n#\n#
                  -=[ Rule Logic ]=-\n# This rule inspects the Connection header and
                  looks for duplicates of the\n# keep-alive and close options.\n#\n#
                  -=[ References ]=-\n# https://datatracker.ietf.org/doc/html/rfc7233\n#\nSecRule
                  REQUEST_HEADERS:Connection \"@rx \\b(?:keep-alive|close),\\s?(?:keep-alive|close)\\b\"
                  \\\n    \"id:920210,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Multiple/Conflicting
                  Connection Header Data Found'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n#\n#
                  Check URL encodings\n#\n# -=[ Rule Logic ]=-\n# There are two different
                  chained rules.    We need to separate them as we are inspecting
                  two\n# different variables - REQUEST_URI_RAW and REQUEST_BODY.   For
                  REQUEST_BODY, we only want to\n# run the @validateUrlEncoding operator
                  if the content-type is application/x-www-form-urlencoding.\n#\n#
                  We exclude the last path segment from validation because it could
                  be a file name, which could\n# easily contain a ''%'' character
                  that is not part of a URI encoded sequence.\n#\n# -=[ References
                  ]=-\n# http://www.ietf.org/rfc/rfc1738.txt\n#\n# -=[ Example payload
                  ]=-\n# http://localhost/?s=a%20b%20c%''/\n# reason: %''/ is not
                  a valid url encoding\n#\n# Regular expression generated from regex-assembly/920220-chain1.ra.\n#
                  To update the regular expression run the following shell script\n#
                  (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920220-chain1\n#\nSecRule
                  REQUEST_URI_RAW \"@rx \\x25\" \\\n    \"id:920220,\\\n    phase:1,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''URL
                  Encoding Abuse Attack Attempt'',\\\n    logdata:''%{REQUEST_URI_RAW}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267/72'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  REQUEST_URI_RAW \"@rx ^(.*)/(?:[^\\?]+)?(\\?.*)?$\" \\\n        \"capture,\\\n        chain\"\n        SecRule
                  TX:1|TX:2 \"@validateUrlEncoding\" \\\n            \"t:none,t:urlDecodeUni,\\\n            setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#
                  Validate URI encoding of the last path segment, only if it does
                  not look like a file name.\n# A file name could easily contain a
                  ''%'' character that is not part of a URI encoded sequence.\n#\n#
                  Regular expression generated from regex-assembly/920221.ra.\n# To
                  update the regular expression run the following shell script\n#
                  (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920221\n#\nSecRule
                  REQUEST_BASENAME \"!@rx ^.*%.*\\.[^\\s\\v\\.]+$\" \\\n    \"id:920221,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''URL
                  Encoding Abuse Attack Attempt'',\\\n    logdata:''%{REQUEST_BASENAME}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267/72'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  TX:0 \"@validateUrlEncoding\" \\\n        \"t:none,t:urlDecodeUni,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Check UTF encoding\n# We only want to apply this check if UTF-8
                  encoding is actually used by the site, otherwise\n# it will result
                  in false positives.\n#\n# -=[ Rule Logic ]=-\n# This chained rule
                  first checks to see if the admin has set the TX:CRS_VALIDATE_UTF8_ENCODING\n#
                  variable in the crs-setup.conf file.\n#\nSecRule TX:CRS_VALIDATE_UTF8_ENCODING
                  \"@eq 1\" \\\n    \"id:920250,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''UTF8
                  Encoding Abuse Attack Attempt'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  REQUEST_FILENAME|ARGS|ARGS_NAMES \"@validateUtf8Encoding\" \\\n        \"setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  Disallow use of full-width unicode as decoding evasions may be possible.\n#\n#
                  -=[ Rule Logic ]=-\n# This rule looks for full-width encoding by
                  looking for %u followed by 2 ''f''\n# characters and then 2 hex
                  characters. It is a vulnerability that affected\n# IIS circa 2007.\n#
                  The rule will trigger on %uXXXX formatted chars that are full or
                  half\n# width, as explained above. This %uXXXX format is passed
                  as a raw parameter\n# and is (seemingly only) accepted by IIS (5.0,
                  6.0, 7.0, and 8.0). Other\n# webservers will only process unicode
                  chars presented as hex UTF-8 bytes.\n#\n# -=[ References ]=-\n#
                  http://www.kb.cert.org/vuls/id/739224\n# https://www.checkpoint.com/defense/advisories/public/2007/cpai-2007-201.html\n#
                  https://github.com/SpiderLabs/owasp-modsecurity-crs/issues/719\n#\n#
                  Regular expression generated from regex-assembly/920260.ra.\n# To
                  update the regular expression run the following shell script\n#
                  (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920260\n#\nSecRule
                  REQUEST_URI|REQUEST_BODY \"@rx (?i)%uff[0-9a-f]{2}\" \\\n    \"id:920260,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Unicode
                  Full/Half Width Abuse Attack Attempt'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-iis'',\\\n    tag:''platform-windows'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267/72'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  Restrict type of characters sent\n#\n# This is a rule with multiple
                  stricter siblings that grows more\n# restrictive in higher paranoia
                  levels.\n#\n# -=[ Rule Logic ]=-\n# This rule uses the @validateByteRange
                  operator to restrict the request\n# payloads.\n#\n# -=[ Targets
                  and ASCII Ranges ]=-\n#\n# 920270: PL1 : REQUEST_URI, REQUEST_HEADERS,
                  ARGS and ARGS_NAMES\n#       ASCII 1-255 : Full ASCII range without
                  null character\n#\n# 920271: PL2 : REQUEST_URI, REQUEST_HEADERS,
                  ARGS and ARGS_NAMES\n#       ASCII 9,10,13,32-126,128-255 : Full
                  visible ASCII range, tab, newline\n#\n# 920272: PL3 : REQUEST_URI,
                  REQUEST_HEADERS, ARGS, ARGS_NAMES and REQUEST_BODY\n#       ASCII
                  32-36,38-126 : Visible lower ASCII range without percent symbol\n#\n#
                  920273: PL4 : ARGS, ARGS_NAMES and REQUEST_BODY\n#       ASCII 38,44-46,48-58,61,65-90,95,97-122\n#       A-Z
                  a-z 0-9 = - _ . , : &\n#\n# 920274: PL4 : REQUEST_HEADERS without
                  User-Agent, Referer, Cookie\n#               and Structured Header
                  booleans\n#       ASCII 32,34,38,42-59,61,65-90,95,97-122\n#       A-Z
                  a-z 0-9 = - _ . , : & \" * + / SPACE\n#\n# REQUEST_URI and REQUEST_HEADERS
                  User-Agent, Referer and Cookie are very hard\n# to restrict beyond
                  the limits in 920272. Structured Header booleans are\n# validated
                  separately in 920275.\n#\n# 920274 generally has few positives.
                  However, it would detect rare attacks\n# on Accept request headers
                  and friends.\n\nSecRule REQUEST_URI|REQUEST_HEADERS|ARGS|ARGS_NAMES
                  \"@validateByteRange 1-255\" \\\n    \"id:920270,\\\n    phase:2,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''Invalid
                  character in request (null character)'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Do not accept requests without common headers.\n# All normal web
                  browsers include Host, User-Agent and Accept headers.\n# Implies
                  either an attacker or a legitimate automation client.\n#\n\n#\n#
                  Missing/Empty Host Header\n#\n# -=[ Rule Logic ]=-\n# These rules
                  will first check to see if a Host header is present.\n# The second
                  check is to see if a Host header exists but is empty.\n#\nSecRule
                  &REQUEST_HEADERS:Host \"@eq 0\" \\\n    \"id:920280,\\\n    phase:1,\\\n    pass,\\\n    t:none,\\\n    msg:''Request
                  Missing a Host Header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/6.5.10'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}'',\\\n    skipAfter:END-HOST-CHECK\"\n\n\nSecRule
                  REQUEST_HEADERS:Host \"@rx ^$\" \\\n    \"id:920290,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Empty
                  Host Header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\nSecMarker
                  \"END-HOST-CHECK\"\n\n\n#\n# Empty Accept Header\n#\n# -=[ Rule
                  Logic ]=-\n# This rule checks if an Accept header exists, but has
                  an empty value.\n# This is only allowed in combination with the
                  OPTIONS method.\n# Additionally, there are some clients sending
                  empty Accept headers.\n# They are covered in another chained rule
                  checking the User-Agent.\n# This technique demands a separate rule
                  to detect an empty\n# Accept header if there is no user agent. This
                  is checked via\n# the separate rule 920311.\n#\n# Exclude some common
                  broken clients sending empty Accept header:\n# \"Business/6.6.1.2
                  CFNetwork/758.5.3 Darwin/15.6.0\" (CRS issue #515)\n# \"Entreprise/6.5.0.177
                  CFNetwork/758.4.3 Darwin/15.5.0\" (CRS issue #366)\n#\n# -=[ References
                  ]=-\n# https://github.com/SpiderLabs/owasp-modsecurity-crs/issues/366\n#\n\nSecRule
                  REQUEST_HEADERS:Accept \"@rx ^$\" \\\n    \"id:920310,\\\n    phase:1,\\\n    pass,\\\n    t:none,\\\n    msg:''Request
                  Has an Empty Accept Header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''NOTICE'',\\\n    chain\"\n    SecRule
                  REQUEST_METHOD \"!@rx ^OPTIONS$\" \\\n        \"chain\"\n        SecRule
                  REQUEST_HEADERS:User-Agent \"!@pm AppleWebKit Android Business Enterprise
                  Entreprise\" \\\n            \"t:none,\\\n            setvar:''tx.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}''\"\n\n#\n#
                  This rule is a sibling of rule 920310.\n#\nSecRule REQUEST_HEADERS:Accept
                  \"@rx ^$\" \\\n    \"id:920311,\\\n    phase:1,\\\n    pass,\\\n    t:none,\\\n    msg:''Request
                  Has an Empty Accept Header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''NOTICE'',\\\n    chain\"\n    SecRule
                  REQUEST_METHOD \"!@rx ^OPTIONS$\" \\\n        \"chain\"\n        SecRule
                  &REQUEST_HEADERS:User-Agent \"@eq 0\" \\\n            \"t:none,\\\n            setvar:''tx.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}''\"\n\n\n#\n#
                  Empty User-Agent Header\n#\n# -=[ Rule Logic ]=-\n# This rules will
                  check to see if the User-Agent header is empty.\n#\n# Note that
                  there is a second rule, 920320, which will check for\n# the existence
                  of the User-Agent header.\n#\n\nSecRule REQUEST_HEADERS:User-Agent
                  \"@rx ^$\" \\\n    \"id:920330,\\\n    phase:1,\\\n    pass,\\\n    t:none,\\\n    msg:''Empty
                  User Agent Header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''NOTICE'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}''\"\n\n#\n#
                  Missing Content-Type Header with Request Body\n#\n# -=[ Rule Logic
                  ]=-\n# This rule will first check to see if the value of the Content-Length
                  header is\n# non-equal to 0. The chained rule is then checking the
                  existence of the\n# Content-Type header. The RFCs do not state there
                  must be a\n# Content-Type header. However, a request missing a Content-Header
                  is a\n# strong indication of a non-compliant browser.\n#\n# Also,
                  omitting the CT header allows to bypass the Request Body Processor\n#
                  unless you set the optional tx.enforce_bodyproc_urlencoded variable.\n#\n#
                  Note: in default settings, this behavior only provides a NOTICE
                  and will\n# not cause a request to be blocked. However, in paranoia
                  level 2 or\n# higher, we run sibling 920341, which DOES block these
                  requests.\n#\n# -=[ References ]=-\n# http://httpwg.org/specs/rfc7231.html#header.content-type\n\nSecRule
                  REQUEST_HEADERS:Content-Length \"!@rx ^0$\" \\\n    \"id:920340,\\\n    phase:1,\\\n    pass,\\\n    t:none,\\\n    msg:''Request
                  Containing Content, but Missing Content-Type header'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''NOTICE'',\\\n    chain\"\n    SecRule
                  &REQUEST_HEADERS:Content-Type \"@eq 0\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}''\"\n\n#
                  Check that the host header is not an IP address\n# This is not an
                  HTTP RFC violation but it is indicative of automated client access.\n#
                  Many web-based worms propagate by scanning IP address blocks.\n#\n#
                  -=[ Rule Logic ]=-\n# This rule triggers if the Host header contains
                  an IPv4 or IPv6 address, optionally\n# extended with a port number.
                  In the case of IPv6 we covering the address with square\n# brackets
                  and the address without square brackets.\n#\n# The regex consists
                  of three main parts and said optional group:\n#\n# * IPv4 address\n#
                  * IPv6 address with square brackets\n# * IPv6 address without square
                  brackets\n# * optional colon and port number\n#\n# Please note that
                  the regex does not test the validity of the IP addresses.\n# It
                  just tries to detect a potential IP address.\n#\n# -=[ References
                  ]=-\n# https://technet.microsoft.com/en-us/magazine/2005.01.hackerbasher.aspx\n#\n\nSecRule
                  REQUEST_HEADERS:Host \"@rx (?:^([\\d.]+|\\[[\\da-f:]+\\]|[\\da-f:]+)(:[\\d]+)?$)\"
                  \\\n    \"id:920350,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Host
                  header is a numeric IP address'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/6.5.10'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}''\"\n\n\n#
                  In most cases, you should expect a certain volume of each a request
                  on your\n# website. For example, a request with 400 arguments, can
                  be suspicious.\n# This file creates limitations on the request.\n#\n#
                  TODO Look at the rules in this file, and define the sizes you''d
                  like to enforce.\n#           Note that most of the rules are commented
                  out by default.\n#           Uncomment the rules you need\n#\n\n\n#\n#
                  Maximum number of arguments in request limited\n#\nSecRule &TX:MAX_NUM_ARGS
                  \"@eq 1\" \\\n    \"id:920380,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Too
                  many arguments in request'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  &ARGS \"@gt %{tx.max_num_args}\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n##
                  -- Arguments limits --\n#\n# Limit argument name length\n#\nSecRule
                  &TX:ARG_NAME_LENGTH \"@eq 1\" \\\n    \"id:920360,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Argument
                  name too long'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  ARGS_NAMES \"@gt %{tx.arg_name_length}\" \\\n        \"t:none,t:length,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Limit argument value length\n#\n# This rule is also triggered by
                  an Apache Struts Remote Code Execution exploit:\n# [ Apache Struts
                  vulnerability CVE-2017-9791 - Exploit tested: https://www.exploit-db.com/exploits/42324
                  ]\n#\nSecRule &TX:ARG_LENGTH \"@eq 1\" \\\n    \"id:920370,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Argument
                  value too long'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  ARGS \"@gt %{tx.arg_length}\" \\\n        \"t:none,t:length,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Limit arguments total length\n#\nSecRule &TX:TOTAL_ARG_LENGTH \"@eq
                  1\" \\\n    \"id:920390,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Total
                  arguments size exceeded'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
