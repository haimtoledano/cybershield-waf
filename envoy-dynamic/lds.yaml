                  FILES_COMBINED_SIZE \"@gt %{tx.combined_file_sizes}\" \\\n        \"t:none,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n\n#\n#
                  Restrict which content-types we accept.\n#\n\n# Restrict Content-Type
                  header to established patterns.\n#\n# This provides generic allow
                  list protection against vulnerabilities like\n# Apache Struts Content-Type
                  arbitrary command execution (CVE-2017-5638).\n#\n# Examples of allowed
                  patterns:\n# - text/plain\n# - text/plain; charset=\"UTF-8\"\n#
                  - multipart/form-data; boundary=----WebKitFormBoundary12345\n# -
                  application/soap+xml; charset=utf-8; action=\"urn:localhost-hwh#getQuestions\"\n#
                  - application/*+json\n\nSecRule REQUEST_HEADERS:Content-Type \"!@rx
                  ^[\\w/.+*-]+(?:\\s?;\\s?(?:action|boundary|charset|component|start(?:-info)?|type|version)\\s?=\\s?[''\\\"\\w.()+,/:=?<>@#*-]+)*$\"
                  \\\n    \"id:920470,\\\n    phase:1,\\\n    block,\\\n    t:none,t:lowercase,\\\n    msg:''Illegal
                  Content-Type header'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#
                  In case Content-Type header can be parsed, check the mime-type against\n#
                  the policy defined in the ''allowed_request_content_type'' variable.\n#
                  To change your policy, edit crs-setup.conf and activate rule 900220.\nSecRule
                  REQUEST_HEADERS:Content-Type \"@rx ^[^;\\s]+\" \\\n    \"id:920420,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,\\\n    msg:''Request
                  content type is not allowed by policy'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.content_type=|%{tx.0}|'',\\\n    chain\"\n    SecRule
                  TX:content_type \"!@within %{tx.allowed_request_content_type}\"
                  \\\n        \"t:lowercase,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\n#\n#
                  Restrict charset parameter within the content-type header\n#\nSecRule
                  REQUEST_HEADERS:Content-Type \"@rx charset\\s*=\\s*[\\\"'']?([^;\\\"''\\s]+)\"
                  \\\n    \"id:920480,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,\\\n    msg:''Request
                  content type charset is not allowed by policy'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.content_type_charset=|%{tx.1}|'',\\\n    chain\"\n    SecRule
