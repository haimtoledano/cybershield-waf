                  See\n# https://www.netnea.com/cms/2016/04/26/easing-in-conditional-modsecurity-rule-execution-based-on-pseudo-random-numbers/\n#\n\n#\n#
                  Generate the pseudo random number\n#\n# ATTENTION: This is no cryptographically
                  secure random number. It''s just\n# a cheap way to get some random
                  number suitable for sampling.\n#\n# We take the entropy contained
                  in the UNIQUE_ID. We hash that variable and\n# take the first integer
