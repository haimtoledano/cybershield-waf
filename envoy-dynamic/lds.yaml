                  REQUEST_HEADERS:Content-Type \"@rx ^[^\\s\\v,;]+[\\s\\v,;].*?(?:application/(?:.+\\+)?json|(?:application/(?:soap\\+)?|text/)xml)\"
                  \\\n    \"id:921421,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,t:lowercase,\\\n    msg:''Content-Type
