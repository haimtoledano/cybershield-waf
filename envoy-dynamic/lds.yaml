                  protocol version is not allowed by policy'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/6.5.10'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Restrict file extension\n#\nSecRule REQUEST_BASENAME \"@rx \\.([^.]+)$\"
                  \\\n    \"id:920440,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''URL
                  file extension is restricted by policy'',\\\n    logdata:''%{TX.0}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/6.5.10'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.extension=.%{tx.1}/'',\\\n    chain\"\n    SecRule
                  TX:EXTENSION \"@within %{tx.restricted_extensions}\" \\\n        \"t:none,t:urlDecodeUni,t:lowercase,\\\n        setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Backup or \"working\" file extension\n# example: index.php~, /index.php~/foo/\n#\nSecRule
                  REQUEST_FILENAME \"@rx \\.[^.~]+~(?:/.*|)$\" \\\n    \"id:920500,\\\n    phase:1,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''Attempt
                  to access a backup or working file'',\\\n    logdata:''%{TX.0}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/6.5.10'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Restricted HTTP headers\n#\n# -=[ Rule Logic ]=-\n# The use of certain
                  headers is restricted. They are listed in two variables:\n# - TX.restricted_headers_basic:
                  Known security risks, always forbidden (rule\n#                                920450)\n#
                  - TX.restricted_headers_extended: Possible false positives, possible
                  security\n#                                   risks, may be forbidden
                  (rule 920451)\n#\n# The headers are transformed into lowercase before
                  the match. In order to make\n# sure that only complete header names
                  match, the names in the\n# TX.restricted_headers_* variables are
                  wrapped in slashes. This guarantees that\n# the Range header (which
                  becomes /range/) will not match the restricted\n# /content-range/
                  header, for example.\n#\n# This is a chained rule, where the first
                  rule fills a set of variables of the\n# form TX.header_name_<RULE_ID>_<HEADER_NAME>.
                  The second rule is then executed\n# for all variables of the form
                  TX.header_name_<RULE_ID>_<HEADER_NAME>.\n#\n# As a consequence of
                  the construction of the rule, the alert message and the\n# alert
                  data will not display the original header name Content-Range, but\n#
                  /content-range/ instead.\n#\n# This rule has a stricter sibling,
                  920451, which matches against the variable\n# TX.restricted_headers_extended.
                  It handles deprecated headers that are still\n# in use (so false
                  positives are possible, hence unsuitable for blocking in a\n# default
                  paranoia level 1 installation) and headers with possible security\n#
                  risks.\n#\n# -=[ References ]=-\n# https://access.redhat.com/security/vulnerabilities/httpoxy
                  (Header Proxy)\n# https://www.sidechannel.blog/en/http-method-override-what-it-is-and-how-a-pentester-can-use-it\n#\nSecRule
                  REQUEST_HEADERS_NAMES \"@rx ^.*$\" \\\n    \"id:920450,\\\n    phase:1,\\\n    block,\\\n    capture,\\\n    t:none,t:lowercase,\\\n    msg:''HTTP
                  header is restricted by policy (%{MATCHED_VAR})'',\\\n    logdata:''Restricted
                  header detected: %{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.header_name_920450_%{tx.0}=/%{tx.0}/'',\\\n    chain\"\n    SecRule
                  TX:/^header_name_920450_/ \"@within %{tx.restricted_headers_basic}\"
                  \\\n        \"setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Rule against CVE-2022-21907\n# This rule blocks Accept-Encoding
                  headers longer than 50 characters.\n# The length of 50 is a heuristic
                  based on the length of values from\n# the RFC (https://datatracker.ietf.org/doc/rfc9110/)\n#
                  and the respective values assigned by IANA\n# (https://www.iana.org/assignments/http-parameters/http-parameters.xml#content-coding).\n#\n#
                  This rule has a stricter sibling: 920521\n#\nSecRule REQUEST_HEADERS:Accept-Encoding
                  \"@gt 50\" \\\n    \"id:920520,\\\n    phase:1,\\\n    block,\\\n    t:none,t:lowercase,t:length,\\\n    msg:''Accept-Encoding
                  header exceeded sensible length'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153'',\\\n    tag:''PCI/12.1'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Restrict response charsets that we allow.\n# The following rules
                  make sure that the response will be in an ASCII-compatible charset
                  that\n# phase 4 rules can properly understand and block.\n#\n\n#\n#
                  Some servers rely on the request Accept header to determine what
                  charset to respond with.\n# This rule restricts these to familiar
                  charsets.\n#\n# Regular expression generated from regex-assembly/920600.ra.\n#
                  To update the regular expression run the following shell script\n#
                  (consult https://coreruleset.org/docs/development/regex_assembly/
                  for details):\n#   crs-toolchain regex update 920600\n#\nSecRule
                  REQUEST_HEADERS:Accept \"!@rx ^(?:(?:\\*|[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]+)/(?:\\*|[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]+)|\\*)(?:[\\s\\v]*;[\\s\\v]*(?:charset[\\s\\v]*=[\\s\\v]*\\\"?(?:iso-8859-15?|utf-8|windows-1252)\\b\\\"?|(?:[^\\s\\v
                  -\\\"\\(-\\),/:-\\?\\[-\\]c\\{\\}]|c(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]h\\{\\}]|h(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]a\\{\\}]|a(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]r\\{\\}]|r(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]s\\{\\}]|s(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]e\\{\\}]|e[^!-\\\"\\(-\\),/:-\\?\\[-\\]t\\{\\}]))))))[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]*[\\s\\v]*=[\\s\\v]*[^!\\(-\\),/:-\\?\\[-\\]\\{\\}]+);?)*(?:[\\s\\v]*,[\\s\\v]*(?:(?:\\*|[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]+)/(?:\\*|[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]+)|\\*)(?:[\\s\\v]*;[\\s\\v]*(?:charset[\\s\\v]*=[\\s\\v]*\\\"?(?:iso-8859-15?|utf-8|windows-1252)\\b\\\"?|(?:[^\\s\\v
                  -\\\"\\(-\\),/:-\\?\\[-\\]c\\{\\}]|c(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]h\\{\\}]|h(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]a\\{\\}]|a(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]r\\{\\}]|r(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]s\\{\\}]|s(?:[^!-\\\"\\(-\\),/:-\\?\\[-\\]e\\{\\}]|e[^!-\\\"\\(-\\),/:-\\?\\[-\\]t\\{\\}]))))))[^!-\\\"\\(-\\),/:-\\?\\[-\\]\\{\\}]*[\\s\\v]*=[\\s\\v]*[^!\\(-\\),/:-\\?\\[-\\]\\{\\}]+);?)*)*$\"
                  \\\n    \"id:920600,\\\n    phase:1,\\\n    block,\\\n    t:none,t:lowercase,\\\n    msg:''Illegal
                  Accept header: charset parameter'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Unicode character bypass check for non JSON requests\n# See reported
                  bypass in issue:\n# https://github.com/coreruleset/coreruleset/issues/2512\n#\nSecRule
                  REQBODY_PROCESSOR \"!@streq JSON\" \\\n    \"id:920540,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Possible
                  Unicode character bypass detected'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267/72'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    chain\"\n    SecRule
                  REQUEST_URI|REQUEST_HEADERS|ARGS|ARGS_NAMES \"@rx (?i)\\x5cu[0-9a-f]{4}\"
                  \\\n        \"setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  Disallow any raw URL fragments. The ''#'' character should be omitted
                  or URL-encoded.\n# CRS rules generally do not check REQUEST_URI_RAW,
                  but some servers accept the fragment as part of the URL path/query.\n#
                  This creates false negative evasions.\n#\nSecRule REQUEST_URI_RAW
                  \"@contains #\" \\\n    \"id:920610,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Raw
                  (unencoded) fragment in request URI'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n#\n#
                  The following rule (920620) checks for the presence of 2 or more
                  request Content-Type headers.\n# Content-Type confusion poses a
                  significant security risk to a web application. It occurs when\n#
                  the server and client have different interpretations of the Content-Type
                  header, leading to\n# miscommunication, potential exploitation and
                  WAF bypass.\n#\n# Using Apache, when multiple Content-Type request
                  headers are received, the server combines them\n# into a single
                  header with the values separated by commas. For example, if a client
                  sends multiple\n# Content-Type headers with values \"application/json\"
                  and \"text/plain\", Apache will combine them\n# into a single header
                  like this: \"Content-Type: application/json, text/plain\".\n#\n#
                  On the other hand, Nginx handles multiple Content-Type headers differently.
                  It preserves each\n# header as a separate entity without combining
                  them. So, if a client sends multiple Content-Type\n# headers, Nginx
                  will keep them separate, maintaining the original values.\n#\nSecRule
                  &REQUEST_HEADERS:Content-Type \"@gt 1\" \\\n    \"id:920620,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Multiple
                  Content-Type Request Headers'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''paranoia-level/1'',\\\n    tag:''OWASP_CRS'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}''\"\n\n\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 2\" \"id:920013,phase:1,pass,nolog,skipAfter:END-REQUEST-920-PROTOCOL-ENFORCEMENT\"\nSecRule
                  TX:DETECTION_PARANOIA_LEVEL \"@lt 2\" \"id:920014,phase:2,pass,nolog,skipAfter:END-REQUEST-920-PROTOCOL-ENFORCEMENT\"\n#\n#
                  -= Paranoia Level 2 =- (apply only when tx.detection_paranoia_level
                  is sufficiently high: 2 or higher)\n#\n\n#\n# -=[ Rule Logic ]=-\n#\n#
                  Check the number of range fields in the Range request header.\n#\n#
                  An excessive number of Range request headers can be used to DoS
                  a server.\n# The original CVE proposed an arbitrary upper limit
                  of 5 range fields.\n#\n# Several clients are known to request PDF
                  fields with up to 62 range\n# fields. Therefore the standard rule
                  does not cover PDF files. This is\n# performed in two separate (stricter)
                  siblings of this rule.\n#\n# 920200: PL2: Limit of 5 range header
                  fields for all filenames outside of PDFs\n# 920201: PL2: Limit of
                  62 range header fields for PDFs\n# 920202: PL4: Limit of 5 range
                  header fields for PDFs\n#\n# -=[ References ]=-\n# https://httpd.apache.org/security/CVE-2011-3192.txt\n\n\nSecRule
                  REQUEST_HEADERS:Range|REQUEST_HEADERS:Request-Range \"@rx ^bytes=(?:(?:\\d+)?-(?:\\d+)?\\s*,?\\s*){6}\"
                  \\\n    \"id:920200,\\\n    phase:1,\\\n    block,\\\n    t:none,\\\n    msg:''Range:
                  Too many fields (6 or more)'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''paranoia-level/2'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  REQUEST_BASENAME \"!@endsWith .pdf\" \\\n        \"setvar:''tx.inbound_anomaly_score_pl2=+%{tx.warning_anomaly_score}''\"\n\n#\n#
                  This is a sibling of rule 920200\n#\n\nSecRule REQUEST_BASENAME
                  \"@endsWith .pdf\" \\\n    \"id:920201,\\\n    phase:1,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''Range:
                  Too many fields for pdf request (63 or more)'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''paranoia-level/2'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    chain\"\n    SecRule
                  REQUEST_HEADERS:Range|REQUEST_HEADERS:Request-Range \"@rx ^bytes=(?:(?:\\d+)?-(?:\\d+)?\\s*,?\\s*){63}\"
                  \\\n        \"setvar:''tx.inbound_anomaly_score_pl2=+%{tx.warning_anomaly_score}''\"\n\n\nSecRule
                  ARGS \"@rx %[0-9a-fA-F]{2}\" \\\n    \"id:920230,\\\n    phase:2,\\\n    block,\\\n    t:none,\\\n    msg:''Multiple
                  URL Encoding Detected'',\\\n    logdata:''%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/255/153/267/120'',\\\n    tag:''paranoia-level/2'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''WARNING'',\\\n    setvar:''tx.inbound_anomaly_score_pl2=+%{tx.warning_anomaly_score}''\"\n\n\n#\n#
                  PL2: This is a stricter sibling of 920270.\n#\nSecRule REQUEST_URI|REQUEST_HEADERS|ARGS|ARGS_NAMES
                  \"@validateByteRange 9,10,13,32-126,128-255\" \\\n    \"id:920271,\\\n    phase:2,\\\n    block,\\\n    t:none,t:urlDecodeUni,\\\n    msg:''Invalid
                  character in request (non printable characters)'',\\\n    logdata:''%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'',\\\n    tag:''application-multi'',\\\n    tag:''language-multi'',\\\n    tag:''platform-multi'',\\\n    tag:''attack-protocol'',\\\n    tag:''OWASP_CRS'',\\\n    tag:''capec/1000/210/272'',\\\n    tag:''paranoia-level/2'',\\\n    ver:''OWASP_CRS/4.0.0'',\\\n    severity:''CRITICAL'',\\\n    setvar:''tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}''\"\n\n\n\n#\n#
                  Missing User-Agent Header\n#\n# -=[ Rule Logic ]=-\n# This rules
